name: maven

on:
  push:
    # branches: [ main ]
    tags: [ '*.*.*' ]

permissions:
  contents:     read
  id-token:     write
  attestations: write
  packages:     write

jobs:
  Publish:
    runs-on: ubuntu-latest

    env:
      PKG: artifacts/package.jar

    steps:

# CHECKOUT

    - name: Checkout
      uses: actions/checkout@v6

# INSTALL TOOLS

    - name: Set up JDK 17 for x64
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        architecture: x64

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Install Syft
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | \
          sh -s -- -b /usr/local/bin

    - name: Install grype
      run: |
        curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | \
          sh -s -- -b /usr/local/bin

# BUILD

    - name: Package
      run: mvn -B package

    - name: Pack Maven
      run: |
        mkdir -p artifacts

        cp target/*.jar $PKG

        ls -lah artifacts

# SIGN ARTIFACT

    - name: Sign package
      run: |
        cosign sign-blob \
          --yes \
          --bundle artifacts/sign.bundle.json \
          "$PKG"

# VERIFY SIGNATURE

    - name: Verify package signature
      run: |
        cosign verify-blob \
          --bundle artifacts/sign.bundle.json \
          --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/maven\.yml@refs/(heads/main|tags/v?[0-9]+\.[0-9]+\.[0-9]+)$" \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          "$PKG"

# SBOM

    - name: Generate SBOM
      run: |
        syft dir:. -o cyclonedx-json=artifacts/sbom.json

# SBOM ATTESTATION

    - name: Attest SBOM
      env:
        COSIGN_YES: "true"
      run: |
        cosign attest-blob \
          --yes \
          --bundle artifacts/sbom.bundle.json \
          --predicate artifacts/sbom.json \
          --type cyclonedx \
          "$PKG"

# VERIFY SBOM

    - name: Verify SBOM attestation
      run: |
        cosign verify-blob-attestation \
          --bundle artifacts/sbom.bundle.json \
          --type cyclonedx \
          --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/maven\.yml@refs/(heads/main|tags/v?[0-9]+\.[0-9]+\.[0-9]+)$" \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          "$PKG"

# VULN SCAN

    - name: Scan vulnerabilities
      run: |
        grype --version

        # SBOM'u tara ve attestation için kaydet (önce üret — sıra önemli).
        grype sbom:artifacts/sbom.json -o cyclonedx-json > artifacts/vuln.json

        # İlk geçişte BLOKE ETMEZ — yalnız raporlar (görünür uyarı).
        # Gate'i etkinleştirmek için '|| echo ...' kısmını kaldırın.
        grype sbom:artifacts/sbom.json -f high || echo "::warning::grype: yüksek/kritik zafiyet bulundu (ilk geçişte bloke edilmiyor)"

# VULN ATTESTATION

    - name: Attest vulnerabilities
      run: |
        cosign attest-blob \
          --yes \
          --bundle artifacts/vuln.bundle.json \
          --predicate artifacts/vuln.json \
          --type vuln \
          "$PKG"

# VERIFY VULN

    - name: Verify vulnerability attestation
      run: |
        cosign verify-blob-attestation \
          --bundle artifacts/vuln.bundle.json \
          --type vuln \
          --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/maven\.yml@refs/(heads/main|tags/v?[0-9]+\.[0-9]+\.[0-9]+)$" \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          "$PKG"

# PROVENANCE

    # !!! Provenance sadece public ve enterprise Github hesaplarında kulanılabiliyor.
    # !!! Repolar public oluncaya kadar bu adım kapalı tutulacak.
    # - name: Generate provenance
    #   uses: actions/attest-build-provenance@v4
    #   with:
    #     subject-path: ${{ env.PKG }}

# ARTIFACT UPLOAD

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      # if: always()
      with:
        name: maven-package
        path: |
          artifacts/*.jar
          artifacts/*.json

# PUBLISH

    - name: Deploy to GitHub Packages
      run: mvn -B deploy
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
